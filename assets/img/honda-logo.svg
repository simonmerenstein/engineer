  <desc id="desc">Red Honda wordmark on a light background.</desc>
  <rect width="1600" height="1000" fill="#f8f8f5"/>
  <rect x="120" y="120" width="1360" height="760" rx="28" fill="#ffffff" stroke="#d9dfdf" stroke-width="3"/>
  <text x="800" y="545"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="210"
